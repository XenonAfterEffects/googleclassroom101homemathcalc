<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eagler Player</title>
<style>
  :root {
    --bg: #050505;
    --panel: #0c0c0c;
    --panel-2: #111111;
    --panel-3: #171717;
    --border: #252525;
    --border-active: #4a4a4a;
    --text: #f2f2f2;
    --muted: #9f9f9f;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    overflow: hidden;
  }

  .app {
    min-height: 100vh;
    padding: 22px 22px 22px 152px;
  }

  .sidebar {
    position: fixed;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 5;
  }

  .client-button {
    width: 108px;
    min-height: 52px;
    padding: 0 16px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--panel);
    color: var(--text);
    text-align: left;
    font-size: 0.92rem;
    cursor: pointer;
    transition:
      width 0.24s ease,
      background 0.24s ease,
      border-color 0.24s ease,
      transform 0.24s ease;
  }

  .client-button:hover,
  .client-button:focus-visible {
    width: 152px;
    background: var(--panel-2);
    border-color: var(--border-active);
    outline: none;
    transform: translateX(4px);
  }

  .client-button.active {
    width: 152px;
    background: var(--panel-3);
    border-color: var(--border-active);
  }

  .main {
    width: min(1120px, calc(100vw - 196px));
    margin: 0 auto;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 16px;
  }

  .top-actions {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .slider-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    min-width: 0;
    height: 48px;
    padding: 0 16px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--panel);
  }

  .slider-wrap input {
    width: 100%;
    margin: 0;
    appearance: none;
    height: 6px;
    border-radius: 999px;
    background: linear-gradient(
      90deg,
      #ffffff 0,
      #ffffff var(--fill, 80%),
      #2a2a2a var(--fill, 80%),
      #2a2a2a 100%
    );
    outline: none;
  }

  .slider-wrap input::-webkit-slider-thumb {
    appearance: none;
    width: 16px;
    height: 16px;
    border: 0;
    border-radius: 50%;
    background: #ffffff;
    cursor: pointer;
  }

  .slider-wrap input::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border: 0;
    border-radius: 50%;
    background: #ffffff;
    cursor: pointer;
  }

  .top-button {
    flex: 0 0 auto;
    height: 48px;
    padding: 0 18px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--panel);
    color: var(--text);
    font-size: 0.92rem;
    cursor: pointer;
    transition: background 0.24s ease, border-color 0.24s ease;
  }

  .top-button:hover,
  .top-button:focus-visible {
    background: var(--panel-2);
    border-color: var(--border-active);
    outline: none;
  }

  .server-button {
    background: var(--panel-3);
  }

  .player-shell {
    position: relative;
    width: 100%;
    height: min(82vh, 760px);
    border: 1px solid var(--border);
    border-radius: 16px;
    background: #000000;
    overflow: hidden;
  }

  #playerFrame {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #000000;
  }

  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(0, 0, 0, 0.72);
    color: var(--text);
    text-align: center;
    font-size: 0.95rem;
    letter-spacing: 0.02em;
    transition: opacity 0.2s ease, visibility 0.2s ease;
  }

  .loading.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .player-shell:fullscreen {
    border-radius: 0;
    border: 0;
  }

  .server-modal-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(0, 0, 0, 0.72);
    backdrop-filter: blur(6px);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.2s ease, visibility 0.2s ease;
    z-index: 25;
  }

  .server-modal-overlay.open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  .server-modal {
    position: relative;
    width: min(760px, calc(100vw - 48px));
    height: min(620px, calc(100vh - 80px));
    border: 4px solid #111111;
    border-radius: 48px;
    background: #050505;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
  }

  .server-modal-header {
    position: absolute;
    top: 18px;
    left: -20px;
    z-index: 2;
    padding: 0;
  }

  .server-modal-title {
    margin: 0;
    padding: 18px 26px 18px 32px;
    border: 4px solid #111111;
    border-radius: 6px;
    background: #ffffff;
    color: #111111;
    font-size: 1.2rem;
    font-weight: 700;
    line-height: 1;
    clip-path: polygon(0 0, 100% 0, 100% 20%, 92% 48%, 90% 86%, 82% 100%, 0 100%);
  }

  .server-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border: 3px solid #111111;
    border-radius: 12px;
    background: #ffffff;
    color: #111111;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: filter 0.2s ease;
  }

  .server-close:hover,
  .server-close:focus-visible {
    filter: brightness(1.05);
    outline: none;
  }

  .server-list {
    height: 100%;
    padding: 92px 34px 34px;
    overflow: auto;
  }

  .server-grid {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .server-entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    width: 100%;
    min-height: 74px;
    padding: 16px 16px 16px 28px;
    border: 4px solid #111111;
    border-radius: 24px;
    background: #ffffff;
    color: #111111;
    text-align: left;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.35;
    cursor: default;
  }

  .server-entry-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .server-entry.active {
    background: #f4f4f4;
  }

  .copy-button {
    flex: 0 0 auto;
    min-width: 88px;
    height: 36px;
    padding: 0 16px;
    border: 4px solid #111111;
    border-radius: 12px;
    background: #ffffff;
    color: #111111;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: filter 0.2s ease;
  }

  .copy-button:hover,
  .copy-button:focus-visible {
    filter: brightness(1.05);
    outline: none;
  }

  @media (max-width: 900px) {
    body {
      overflow: auto;
    }

    .app {
      padding: 18px;
    }

    .sidebar {
      position: static;
      transform: none;
      flex-direction: row;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .client-button,
    .client-button.active,
    .client-button:hover,
    .client-button:focus-visible {
      width: 150px;
      transform: none;
    }

    .main {
      width: 100%;
    }

    .player-shell {
      height: 70vh;
      min-height: 420px;
    }

    .server-list {
      padding: 88px 22px 22px;
    }
  }

  @media (max-width: 640px) {
    .top-bar {
      flex-direction: column;
      align-items: stretch;
    }

    .top-actions {
      width: 100%;
      flex-direction: column;
      align-items: stretch;
    }

    .top-button {
      width: 100%;
    }

    .server-modal {
      width: calc(100vw - 24px);
      max-height: calc(100vh - 24px);
      border-radius: 32px;
    }

    .server-modal-header {
      top: 14px;
      left: -12px;
    }

    .server-modal-title {
      padding: 14px 22px 14px 26px;
      font-size: 1.05rem;
    }

    .server-list {
      padding: 84px 16px 16px;
    }

    .server-entry {
      min-height: 66px;
      padding: 12px 12px 12px 20px;
      border-radius: 20px;
    }

    .server-entry-label {
      font-size: 0.88rem;
    }

    .copy-button {
      min-width: 78px;
      height: 34px;
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="clientList"></div>

  <main class="main">
    <div class="top-bar">
      <div class="slider-wrap">
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="Volume" />
      </div>
      <div class="top-actions">
        <button class="top-button server-button" id="serversButton" type="button">Servers</button>
        <button class="top-button" id="fullscreenButton" type="button">Fullscreen</button>
      </div>
    </div>

    <section class="player-shell" id="playerShell">
      <iframe id="playerFrame" title="Eagler player" allow="autoplay; fullscreen" allowfullscreen></iframe>
      <div class="loading" id="loadingOverlay">Loading...</div>
    </section>
  </main>
</div>

<div class="server-modal-overlay" id="serverModalOverlay" aria-hidden="true">
  <section class="server-modal" role="dialog" aria-modal="true" aria-labelledby="serverModalTitle">
    <div class="server-modal-header">
      <h2 class="server-modal-title" id="serverModalTitle">Servers</h2>
      <button class="server-close" id="closeServersButton" type="button" aria-label="Close servers menu">X</button>
    </div>
    <div class="server-list">
      <div class="server-grid" id="serverGrid"></div>
    </div>
  </section>
</div>

<script>
  const CLIENTS = [
    { id: "wurstx", name: "WurstX", file: "WurstX.html" },
    { id: "resent", name: "Resent Client", file: "ResentClient5.1.html" },
    { id: "dragonx", name: "DragonX", file: "DragonX_V2_International (1) (1)(1).html" }
  ];

  const SERVERS = [
    {
      name: "Voidsent MC",
      votes: 1459,
      ip: "wss://mc.voidsent.net",
      tags: ["PVP", "PVE", "FACTIONS", "MINIGAMES", "SURVIVAL", "RPG", "MISCELLANEOUS"]
    },
    {
      name: "VanillaMC",
      votes: 1037,
      ip: "wss://vanillamc.org",
      tags: ["PVP", "FACTIONS", "SURVIVAL"]
    },
    {
      name: "TuffNET",
      votes: 507,
      ip: "wss://tuff.ws",
      tags: ["SURVIVAL", "SKYBLOCK"]
    },
    {
      name: "Dumbshit Survival X | 1.12.2 | Vanilla Survival",
      votes: 494,
      ip: "wss://mc.dssx.uk",
      tags: ["SURVIVAL", "MINIGAMES"]
    },
    {
      name: "Lifesteal & Creative & Anarchy",
      votes: 216,
      ip: "wss://play.heartsmp.net",
      tags: ["PVP", "PVE", "FACTIONS", "SURVIVAL", "MISCELLANEOUS", "MINIGAMES", "CREATIVE", "SKYBLOCK", "PRISON", "RPG"]
    },
    {
      name: "MercuryMC",
      votes: 211,
      ip: "wss://mercurymc.net",
      tags: ["SURVIVAL", "PVE", "PVP", "FACTIONS", "MISCELLANEOUS"]
    },
    {
      name: "ArchMC",
      votes: 177,
      ip: "wss://arch.mc",
      tags: ["PVP", "MINIGAMES", "SURVIVAL", "CREATIVE", "PRISON", "MISCELLANEOUS"]
    },
    {
      name: "Fyre Network (BACK ONLINE!!)",
      votes: 139,
      ip: "wss://eagler.imcalledfyre.com",
      tags: ["PVP", "MINIGAMES", "SURVIVAL", "PRISON", "MISCELLANEOUS", "SKYBLOCK", "PVE"]
    },
    {
      name: "Pixel Craft",
      votes: 122,
      ip: "wss://pcsmp.net",
      tags: ["PVP", "CREATIVE", "MISCELLANEOUS", "MINIGAMES", "PVE", "FACTIONS", "SURVIVAL", "RPG"]
    },
    {
      name: "null's World",
      votes: 120,
      ip: "wss://mc.nullsworld.net",
      tags: ["PVP", "MINIGAMES", "PVE", "SURVIVAL", "CREATIVE", "SKYBLOCK", "RPG", "MISCELLANEOUS"]
    },
    {
      name: "xendMC",
      votes: 69,
      ip: "wss://xenamc.com",
      tags: ["PVP", "MINIGAMES", "SURVIVAL", "SKYBLOCK", "MISCELLANEOUS"]
    },
    {
      name: "SkeletonMC",
      votes: 65,
      ip: "wss://eagler.skeletonmc.com",
      tags: ["SURVIVAL", "PVP", "PVE"]
    },
    {
      name: "BedWetr [Natural disasters :>, Pillars Of Fortune]",
      votes: 59,
      ip: "wss://bedw3tr.bytommy.uk",
      tags: ["SURVIVAL", "MINIGAMES", "PVP", "MISCELLANEOUS"]
    }
  ];

  const AUDIO_BRIDGE_SOURCE = `
    (() => {
      const state = window.__launcherAudioBridgeState || {
        volume: 0.8,
        contexts: new Set()
      };

      window.__launcherAudioBridgeState = state;

      const nativeConnect =
        window.AudioNode &&
        window.AudioNode.prototype &&
        window.AudioNode.prototype.connect
          ? window.AudioNode.prototype.connect
          : null;

      const clamp = (value) => Math.min(1, Math.max(0, Number(value) || 0));

      function patchContext(context) {
        if (!context || !nativeConnect || context.__launcherGain) {
          return;
        }

        const gain = context.createGain();
        gain.gain.value = state.volume;
        nativeConnect.call(gain, context.destination);
        context.__launcherGain = gain;
        state.contexts.add(context);
      }

      function applyMediaVolume(root) {
        if (!root || !root.querySelectorAll) {
          return;
        }

        root.querySelectorAll("audio,video").forEach((media) => {
          try {
            media.volume = state.volume;
          } catch (error) {
          }
        });
      }

      if (nativeConnect && !window.AudioNode.prototype.__launcherPatched) {
        window.AudioNode.prototype.connect = function (...args) {
          if (args[0] && this.context && args[0] === this.context.destination) {
            patchContext(this.context);
            if (this.context.__launcherGain) {
              args[0] = this.context.__launcherGain;
            }
          }

          return nativeConnect.apply(this, args);
        };

        Object.defineProperty(window.AudioNode.prototype, "__launcherPatched", {
          value: true
        });
      }

      window.__launcherAudioBridge = {
        setVolume(value) {
          state.volume = clamp(value);
          state.contexts.forEach((context) => {
            try {
              if (context.__launcherGain) {
                context.__launcherGain.gain.value = state.volume;
              }
            } catch (error) {
            }
          });

          applyMediaVolume(document);
        }
      };

      applyMediaVolume(document);
    })();
  `;

  const clientList = document.getElementById("clientList");
  const volumeSlider = document.getElementById("volumeSlider");
  const serversButton = document.getElementById("serversButton");
  const fullscreenButton = document.getElementById("fullscreenButton");
  const playerShell = document.getElementById("playerShell");
  const playerFrame = document.getElementById("playerFrame");
  const loadingOverlay = document.getElementById("loadingOverlay");
  const serverModalOverlay = document.getElementById("serverModalOverlay");
  const closeServersButton = document.getElementById("closeServersButton");
  const serverGrid = document.getElementById("serverGrid");

  let activeClientId = CLIENTS[0].id;
  let loadTimer = null;
  let loadRequestId = 0;

  function updateSliderFill() {
    const fill = Math.round(Number(volumeSlider.value) * 100);
    volumeSlider.style.setProperty("--fill", fill + "%");
  }

  function showLoading(text) {
    loadingOverlay.textContent = text;
    loadingOverlay.classList.remove("hidden");
  }

  function hideLoading() {
    loadingOverlay.classList.add("hidden");
  }

  function setActiveButton() {
    clientList.querySelectorAll(".client-button").forEach((button) => {
      button.classList.toggle("active", button.dataset.clientId === activeClientId);
    });
  }

  function applyVolumeToFrame() {
    const volume = Number(volumeSlider.value);

    try {
      if (playerFrame.contentWindow && playerFrame.contentWindow.__launcherAudioBridge) {
        playerFrame.contentWindow.__launcherAudioBridge.setVolume(volume);
      }
    } catch (error) {
    }

    try {
      const mediaNodes = playerFrame.contentDocument.querySelectorAll("audio,video");
      mediaNodes.forEach((media) => {
        media.volume = volume;
      });
    } catch (error) {
    }
  }

  function installAudioBridge() {
    try {
      const frameDocument = playerFrame.contentDocument;
      if (!frameDocument) {
        return;
      }

      if (frameDocument.getElementById("launcher-audio-bridge")) {
        applyVolumeToFrame();
        return;
      }

      const script = frameDocument.createElement("script");
      script.id = "launcher-audio-bridge";
      script.textContent = AUDIO_BRIDGE_SOURCE;

      if (frameDocument.head) {
        frameDocument.head.appendChild(script);
      } else {
        frameDocument.documentElement.appendChild(script);
      }

      applyVolumeToFrame();
    } catch (error) {
    }
  }

  function buildButtons() {
    CLIENTS.forEach((client) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "client-button";
      button.dataset.clientId = client.id;
      button.textContent = client.name;
      button.addEventListener("click", () => {
        if (activeClientId === client.id) {
          return;
        }

        loadClient(client.id);
      });
      clientList.appendChild(button);
    });

    setActiveButton();
  }

  function updateCopyButtonState(button, text) {
    const originalText = button.dataset.originalText || "Copy";
    button.textContent = text;
    window.setTimeout(() => {
      button.textContent = originalText;
    }, 1200);
  }

  async function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return;
    }

    const helper = document.createElement("textarea");
    helper.value = text;
    helper.setAttribute("readonly", "");
    helper.style.position = "absolute";
    helper.style.left = "-9999px";
    document.body.appendChild(helper);
    helper.select();
    document.execCommand("copy");
    document.body.removeChild(helper);
  }

  function buildServerMenu() {
    const fragment = document.createDocumentFragment();

    SERVERS.forEach((server) => {
      const row = document.createElement("div");
      row.className = "server-entry";

      const label = document.createElement("div");
      label.className = "server-entry-label";
      label.textContent = server.name;

      const copyButton = document.createElement("button");
      copyButton.type = "button";
      copyButton.className = "copy-button";
      copyButton.textContent = "Copy";
      copyButton.dataset.originalText = "Copy";
      copyButton.addEventListener("click", async () => {
        try {
          await copyText(server.ip);
          updateCopyButtonState(copyButton, "Copied");
        } catch (error) {
          updateCopyButtonState(copyButton, "Failed");
        }
      });

      row.appendChild(label);
      row.appendChild(copyButton);
      fragment.appendChild(row);
    });

    serverGrid.appendChild(fragment);
  }

  function openServerMenu() {
    serverModalOverlay.classList.add("open");
    serverModalOverlay.setAttribute("aria-hidden", "false");
  }

  function closeServerMenu() {
    serverModalOverlay.classList.remove("open");
    serverModalOverlay.setAttribute("aria-hidden", "true");
  }

  function loadClient(clientId) {
    const client = CLIENTS.find((entry) => entry.id === clientId);
    if (!client) {
      return;
    }

    const requestId = ++loadRequestId;
    activeClientId = client.id;
    setActiveButton();
    showLoading("Loading " + client.name + "...");

    if (loadTimer) {
      window.clearTimeout(loadTimer);
    }

    loadTimer = window.setTimeout(() => {
      if (requestId !== loadRequestId) {
        return;
      }

      showLoading("Still loading " + client.name + "...");
    }, 3500);

    const clientUrl = new URL(client.file, window.location.href);
    clientUrl.searchParams.set("launcher", String(Date.now()));
    playerFrame.src = clientUrl.href;
  }

  playerFrame.addEventListener("load", () => {
    if (loadTimer) {
      window.clearTimeout(loadTimer);
      loadTimer = null;
    }

    installAudioBridge();
    applyVolumeToFrame();
    hideLoading();
  });

  playerFrame.addEventListener("error", () => {
    if (loadTimer) {
      window.clearTimeout(loadTimer);
      loadTimer = null;
    }

    const activeClient = CLIENTS.find((entry) => entry.id === activeClientId);
    showLoading("Could not load " + (activeClient ? activeClient.name : "client") + ".");
  });

  volumeSlider.addEventListener("input", () => {
    updateSliderFill();
    applyVolumeToFrame();
  });

  serversButton.addEventListener("click", openServerMenu);
  closeServersButton.addEventListener("click", closeServerMenu);
  serverModalOverlay.addEventListener("click", (event) => {
    if (event.target === serverModalOverlay) {
      closeServerMenu();
    }
  });

  fullscreenButton.addEventListener("click", async () => {
    if (document.fullscreenElement === playerShell) {
      await document.exitFullscreen();
      fullscreenButton.textContent = "Fullscreen";
      return;
    }

    await playerShell.requestFullscreen();
    fullscreenButton.textContent = "Exit Fullscreen";
  });

  document.addEventListener("fullscreenchange", () => {
    fullscreenButton.textContent =
      document.fullscreenElement === playerShell ? "Exit Fullscreen" : "Fullscreen";
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape" && serverModalOverlay.classList.contains("open")) {
      closeServerMenu();
    }
  });

  updateSliderFill();
  buildButtons();
  buildServerMenu();
  loadClient(activeClientId);
</script>
</body>
</html>
