<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eagler Player</title>
<style>
  :root {
    --bg: #050505;
    --panel: #0c0c0c;
    --panel-2: #111111;
    --panel-3: #171717;
    --border: #252525;
    --border-active: #4a4a4a;
    --text: #f2f2f2;
    --muted: #9f9f9f;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    overflow: hidden;
  }

  .app {
    min-height: 100vh;
    padding: 22px 22px 22px 152px;
  }

  .sidebar {
    position: fixed;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 5;
  }

  .client-button {
    width: 108px;
    min-height: 52px;
    padding: 0 16px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--panel);
    color: var(--text);
    text-align: left;
    font-size: 0.92rem;
    cursor: pointer;
    transition:
      width 0.24s ease,
      background 0.24s ease,
      border-color 0.24s ease,
      transform 0.24s ease;
  }

  .client-button:hover,
  .client-button:focus-visible {
    width: 152px;
    background: var(--panel-2);
    border-color: var(--border-active);
    outline: none;
    transform: translateX(4px);
  }

  .client-button.active {
    width: 152px;
    background: var(--panel-3);
    border-color: var(--border-active);
  }

  .main {
    width: min(1120px, calc(100vw - 196px));
    margin: 0 auto;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 16px;
  }

  .slider-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    min-width: 0;
    height: 48px;
    padding: 0 16px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--panel);
  }

  .slider-wrap input {
    width: 100%;
    margin: 0;
    appearance: none;
    height: 6px;
    border-radius: 999px;
    background: linear-gradient(
      90deg,
      #ffffff 0,
      #ffffff var(--fill, 80%),
      #2a2a2a var(--fill, 80%),
      #2a2a2a 100%
    );
    outline: none;
  }

  .slider-wrap input::-webkit-slider-thumb {
    appearance: none;
    width: 16px;
    height: 16px;
    border: 0;
    border-radius: 50%;
    background: #ffffff;
    cursor: pointer;
  }

  .slider-wrap input::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border: 0;
    border-radius: 50%;
    background: #ffffff;
    cursor: pointer;
  }

  .fullscreen-button {
    flex: 0 0 auto;
    height: 48px;
    padding: 0 18px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--panel);
    color: var(--text);
    font-size: 0.92rem;
    cursor: pointer;
    transition: background 0.24s ease, border-color 0.24s ease;
  }

  .fullscreen-button:hover,
  .fullscreen-button:focus-visible {
    background: var(--panel-2);
    border-color: var(--border-active);
    outline: none;
  }

  .player-shell {
    position: relative;
    width: 100%;
    height: min(82vh, 760px);
    border: 1px solid var(--border);
    border-radius: 16px;
    background: #000000;
    overflow: hidden;
  }

  #playerFrame {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #000000;
  }

  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(0, 0, 0, 0.72);
    color: var(--text);
    text-align: center;
    font-size: 0.95rem;
    letter-spacing: 0.02em;
    transition: opacity 0.2s ease, visibility 0.2s ease;
  }

  .loading.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .player-shell:fullscreen {
    border-radius: 0;
    border: 0;
  }

  @media (max-width: 900px) {
    body {
      overflow: auto;
    }

    .app {
      padding: 18px;
    }

    .sidebar {
      position: static;
      transform: none;
      flex-direction: row;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .client-button,
    .client-button.active,
    .client-button:hover,
    .client-button:focus-visible {
      width: 150px;
      transform: none;
    }

    .main {
      width: 100%;
    }

    .player-shell {
      height: 70vh;
      min-height: 420px;
    }
  }

  @media (max-width: 640px) {
    .top-bar {
      flex-direction: column;
      align-items: stretch;
    }

    .fullscreen-button {
      width: 100%;
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="clientList"></div>

  <main class="main">
    <div class="top-bar">
      <div class="slider-wrap">
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="Volume" />
      </div>
      <button class="fullscreen-button" id="fullscreenButton" type="button">Fullscreen</button>
    </div>

    <section class="player-shell" id="playerShell">
      <iframe id="playerFrame" title="Eagler player" allow="autoplay; fullscreen" allowfullscreen></iframe>
      <div class="loading" id="loadingOverlay">Loading player...</div>
    </section>
  </main>
</div>

<script>
  const CLIENTS = [
    { id: "wurstx", name: "Wurst X", file: "WurstX.html" },
    { id: "resent", name: "Resent", file: "ResentClient5.1.html" }
  ];

  const AUDIO_BRIDGE_SOURCE = `
    (() => {
      const state = window.__launcherAudioBridgeState || {
        volume: 0.8,
        contexts: new Set()
      };

      window.__launcherAudioBridgeState = state;

      const nativeConnect =
        window.AudioNode &&
        window.AudioNode.prototype &&
        window.AudioNode.prototype.connect
          ? window.AudioNode.prototype.connect
          : null;

      const clamp = (value) => Math.min(1, Math.max(0, Number(value) || 0));

      function patchContext(context) {
        if (!context || !nativeConnect || context.__launcherGain) {
          return;
        }

        const gain = context.createGain();
        gain.gain.value = state.volume;
        nativeConnect.call(gain, context.destination);
        context.__launcherGain = gain;
        state.contexts.add(context);
      }

      function applyMediaVolume(root) {
        if (!root || !root.querySelectorAll) {
          return;
        }

        root.querySelectorAll("audio,video").forEach((media) => {
          try {
            media.volume = state.volume;
          } catch (error) {
          }
        });
      }

      if (nativeConnect && !window.AudioNode.prototype.__launcherPatched) {
        window.AudioNode.prototype.connect = function (...args) {
          if (args[0] && this.context && args[0] === this.context.destination) {
            patchContext(this.context);
            if (this.context.__launcherGain) {
              args[0] = this.context.__launcherGain;
            }
          }

          return nativeConnect.apply(this, args);
        };

        Object.defineProperty(window.AudioNode.prototype, "__launcherPatched", {
          value: true
        });
      }

      window.__launcherAudioBridge = {
        setVolume(value) {
          state.volume = clamp(value);
          state.contexts.forEach((context) => {
            try {
              if (context.__launcherGain) {
                context.__launcherGain.gain.value = state.volume;
              }
            } catch (error) {
            }
          });

          applyMediaVolume(document);
        }
      };

      applyMediaVolume(document);
    })();
  `;

  const clientList = document.getElementById("clientList");
  const volumeSlider = document.getElementById("volumeSlider");
  const fullscreenButton = document.getElementById("fullscreenButton");
  const playerShell = document.getElementById("playerShell");
  const playerFrame = document.getElementById("playerFrame");
  const loadingOverlay = document.getElementById("loadingOverlay");

  let activeClientId = CLIENTS[0].id;
  let loadTimer = null;

  function updateSliderFill() {
    const fill = Math.round(Number(volumeSlider.value) * 100);
    volumeSlider.style.setProperty("--fill", fill + "%");
  }

  function showLoading(text) {
    loadingOverlay.textContent = text;
    loadingOverlay.classList.remove("hidden");
  }

  function hideLoading() {
    loadingOverlay.classList.add("hidden");
  }

  function setActiveButton() {
    clientList.querySelectorAll(".client-button").forEach((button) => {
      button.classList.toggle("active", button.dataset.clientId === activeClientId);
    });
  }

  function applyVolumeToFrame() {
    const volume = Number(volumeSlider.value);

    try {
      if (playerFrame.contentWindow && playerFrame.contentWindow.__launcherAudioBridge) {
        playerFrame.contentWindow.__launcherAudioBridge.setVolume(volume);
      }
    } catch (error) {
    }

    try {
      const mediaNodes = playerFrame.contentDocument.querySelectorAll("audio,video");
      mediaNodes.forEach((media) => {
        media.volume = volume;
      });
    } catch (error) {
    }
  }

  function installAudioBridge() {
    try {
      const frameDocument = playerFrame.contentDocument;
      if (!frameDocument) {
        return;
      }

      if (frameDocument.getElementById("launcher-audio-bridge")) {
        applyVolumeToFrame();
        return;
      }

      const script = frameDocument.createElement("script");
      script.id = "launcher-audio-bridge";
      script.textContent = AUDIO_BRIDGE_SOURCE;

      if (frameDocument.head) {
        frameDocument.head.appendChild(script);
      } else {
        frameDocument.documentElement.appendChild(script);
      }

      applyVolumeToFrame();
    } catch (error) {
    }
  }

  function buildButtons() {
    CLIENTS.forEach((client) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "client-button";
      button.dataset.clientId = client.id;
      button.textContent = client.name;
      button.addEventListener("click", () => {
        if (activeClientId === client.id) {
          return;
        }

        loadClient(client.id);
      });
      clientList.appendChild(button);
    });

    setActiveButton();
  }

  function loadClient(clientId) {
    const client = CLIENTS.find((entry) => entry.id === clientId);
    if (!client) {
      return;
    }

    activeClientId = client.id;
    setActiveButton();
    showLoading("Loading " + client.name + "...");

    if (loadTimer) {
      window.clearTimeout(loadTimer);
    }

    loadTimer = window.setTimeout(() => {
      showLoading("Still loading " + client.name + "...");
    }, 3500);

    playerFrame.src = "about:blank";
    window.requestAnimationFrame(() => {
      playerFrame.src = client.file;
    });
  }

  playerFrame.addEventListener("load", () => {
    if (loadTimer) {
      window.clearTimeout(loadTimer);
      loadTimer = null;
    }

    installAudioBridge();
    applyVolumeToFrame();
    hideLoading();
  });

  volumeSlider.addEventListener("input", () => {
    updateSliderFill();
    applyVolumeToFrame();
  });

  fullscreenButton.addEventListener("click", async () => {
    if (document.fullscreenElement === playerShell) {
      await document.exitFullscreen();
      fullscreenButton.textContent = "Fullscreen";
      return;
    }

    await playerShell.requestFullscreen();
    fullscreenButton.textContent = "Exit Fullscreen";
  });

  document.addEventListener("fullscreenchange", () => {
    fullscreenButton.textContent =
      document.fullscreenElement === playerShell ? "Exit Fullscreen" : "Fullscreen";
  });

  updateSliderFill();
  buildButtons();
  loadClient(activeClientId);
</script>
</body>
</html>
